name: Auto Post

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  post_job:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coze Workflow
        env:
          COZE_PAT: ${{ secrets.COZE_PAT }}
          COZE_WORKFLOW_ID: ${{ secrets.COZE_WORKFLOW_ID }}
          COZE_SPACE_ID: ${{ secrets.COZE_SPACE_ID }}
        run: |
          curl -X POST "https://api.coze.com/v1/workflow/run" \
          -H "Authorization: Bearer $COZE_PAT" \
          -H "Content-Type: application/json" \
          -H "Agw-Workspace-Id: $COZE_SPACE_ID" \
          -d "{
            \"workflow_id\": \"$COZE_WORKFLOW_ID\",
            \"parameters\": {
              \"USER_INPUT\": \"执行定时行情分析并发布到币安广场\"
            }
          }"
